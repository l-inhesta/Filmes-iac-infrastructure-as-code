name: Deploy Infra DEV

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  ENVIRONMENT: dev
  AWS_REGION: us-east-1

jobs:
  prepare_deploy:
    name: PREPARE S3 AND PARAMETERS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Define bucket name
        run: |
          echo "BUCKET_NAME=infra-filmes-${ENVIRONMENT}" >> $GITHUB_ENV

      - name: Create bucket if not exists
        run: |
          if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null
          then
            echo "Bucket already exists"
          else
            echo "Creating bucket..."
            aws s3 mb s3://$BUCKET_NAME --region $AWS_REGION
          fi

      - name: Create templates folder
        run: |
          aws s3api put-object --bucket "$BUCKET_NAME" --key templates/ >/dev/null

      - name: Upload templates
        run: |
          aws s3 sync templates s3://$BUCKET_NAME/templates

      - name: Load deploy parameters
        run: |
          echo "BUCKET_NAME=$BUCKET_NAME" > deploy-params.env
          python - <<'PY'
          import json
          with open('params/dev.json', 'r', encoding='utf-8') as f:
              params = json.load(f)
          with open('deploy-params.env', 'a', encoding='utf-8') as env:
              for p in params:
                  env.write(f"{p['ParameterKey']}={p['ParameterValue']}\n")
          PY

      - name: Show deploy parameters
        run: |
          echo '--- DEPLOY PARAMETERS ---'
          cat deploy-params.env
          echo '-------------------------'

      - name: Upload deploy parameters artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-params-dev
          path: deploy-params.env
          if-no-files-found: error

  deploy_s3:
    name: DEPLOY S3
    runs-on: ubuntu-latest
    needs: prepare_deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download deploy parameters artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-params-dev

      - name: Export deploy parameters
        run: |
          cat deploy-params.env >> $GITHUB_ENV

      - name: Upload templates
        run: |
          aws s3 sync templates s3://$BUCKET_NAME/templates

      - name: Deploy S3
        run: |
          BUCKET_PARAM="${BucketName:-$BUCKET_NAME}"
          aws cloudformation deploy \
            --stack-name ${ENVIRONMENT}-s3-stack \
            --template-file templates/s3.yaml \
            --parameter-overrides EnvironmentName="${ENVIRONMENT}" BucketName="${BUCKET_PARAM}" \
            --capabilities CAPABILITY_NAMED_IAM

  deploy_policy:
    name: DEPLOY POLICY
    runs-on: ubuntu-latest
    needs: deploy_cloudfront

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download deploy parameters artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-params-dev

      - name: Export deploy parameters
        run: |
          cat deploy-params.env >> $GITHUB_ENV

      - name: Deploy Policy
        run: |
          aws cloudformation deploy \
            --stack-name ${ENVIRONMENT}-policy-stack \
            --template-file templates/policy.yaml \
            --parameter-overrides EnvironmentName="${ENVIRONMENT}" \
            --capabilities CAPABILITY_NAMED_IAM

  deploy_cloudfront:
    name: DEPLOY CLOUDFRONT
    runs-on: ubuntu-latest
    needs: deploy_s3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download deploy parameters artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-params-dev

      - name: Export deploy parameters
        run: |
          cat deploy-params.env >> $GITHUB_ENV

      - name: Deploy CloudFront
        run: |
          aws cloudformation deploy \
            --stack-name ${ENVIRONMENT}-cloudfront-stack \
            --template-file templates/cloudfront.yaml \
            --parameter-overrides EnvironmentName="${ENVIRONMENT}" DomainName="${DomainName}" CertificateArn="${CertificateArn}" \
            --capabilities CAPABILITY_NAMED_IAM

  deploy_route53:
    name: DEPLOY ROUTE53
    runs-on: ubuntu-latest
    needs: deploy_policy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download deploy parameters artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-params-dev

      - name: Export deploy parameters
        run: |
          cat deploy-params.env >> $GITHUB_ENV

      - name: Deploy Route53
        run: |
          aws cloudformation deploy \
            --stack-name ${ENVIRONMENT}-route53-stack \
            --template-file templates/route53.yaml \
            --parameter-overrides EnvironmentName="${ENVIRONMENT}" DomainName="${DomainName}" \
            --capabilities CAPABILITY_NAMED_IAM
