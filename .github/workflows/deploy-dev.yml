name: Deploy Infra DEV

on:
  push:
    branches:
      - dev

env:
  ENVIRONMENT: dev
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 🔥 DEFINIR NOME DO BUCKET
      - name: Definir variáveis
        run: |
          echo "BUCKET_NAME=infra-filmes-${ENVIRONMENT}" >> $GITHUB_ENV

      # 🔥 CRIAR BUCKET AUTOMATICAMENTE
      - name: Criar bucket se não existir
        run: |
          if aws s3 ls "s3://$BUCKET_NAME" 2>&1 | grep -q 'NoSuchBucket'
          then
            echo "Criando bucket..."
            aws s3 mb s3://$BUCKET_NAME --region $AWS_REGION
          else
            echo "Bucket já existe"
          fi

      # 🔥 CRIAR "PASTA" templates/
      - name: Criar pasta templates
        run: |
          echo "" | aws s3 cp - s3://$BUCKET_NAME/templates/

      # 🔥 UPLOAD DOS YAML
      - name: Upload templates
        run: |
          aws s3 sync templates s3://$BUCKET_NAME/templates

      # 🔥 CARREGAR PARÂMETROS DE DEPLOY
      - name: Load deploy parameters
        run: |
          python - <<'PY'
          import json
          import os
          with open('params/dev.json', 'r', encoding='utf-8') as f:
              params = json.load(f)
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as env:
              for p in params:
                  env.write(f"{p['ParameterKey']}={p['ParameterValue']}\n")
          PY

      - name: Show deploy parameters
        run: |
          echo '--- DEPLOY PARAMETERS ---'
          cat "$GITHUB_ENV"
          echo '-------------------------'

      # 🔥 DEPLOY S3
      - name: Deploy S3
        run: |
          aws cloudformation deploy \
            --stack-name ${ENVIRONMENT}-s3-stack \
            --template-file templates/s3.yaml \
            --parameter-overrides EnvironmentName="${ENVIRONMENT}" BucketName="${BucketName}" \
            --capabilities CAPABILITY_NAMED_IAM

      # 🔥 DEPLOY CLOUDFRONT
      - name: Deploy CloudFront
        run: |
          aws cloudformation deploy \
            --stack-name ${ENVIRONMENT}-cloudfront-stack \
            --template-file templates/cloudfront.yaml \
            --parameter-overrides EnvironmentName="${ENVIRONMENT}" DomainName="${DomainName}" CertificateArn="${CertificateArn}" \
            --capabilities CAPABILITY_NAMED_IAM

      # 🔥 DEPLOY POLICY
      - name: Deploy Policy
        run: |
          aws cloudformation deploy \
            --stack-name ${ENVIRONMENT}-policy-stack \
            --template-file templates/policy.yaml \
            --parameter-overrides EnvironmentName=${ENVIRONMENT} \
            --capabilities CAPABILITY_NAMED_IAM

      # 🔥 DEPLOY ROUTE53
      - name: Deploy Route53
        run: |
          aws cloudformation deploy \
            --stack-name ${ENVIRONMENT}-route53-stack \
            --template-file templates/route53.yaml \
            --parameter-overrides EnvironmentName="${ENVIRONMENT}" DomainName="${DomainName}" \
            --capabilities CAPABILITY_NAMED_IAM
